<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>DDA Algorithm Flowchart</title>\n    <style>\n        .rounded-rect {\n            rx: 15;\n            ry: 15;\n            fill: #ADD8E6;\n        }\n        .diamond {\n            fill: #FFCCCB;\n        }\n        .connector {\n            stroke: #000;\n            stroke-width: 2;\n        }\n    </style>\n</head>\n<body>\n    <svg width="600" height="400">\n        <rect class="rounded-rect" x="200" y="20" width="200" height="80" />\n        <text x="300" y="60" text-anchor="middle">Start</text>\n        <line class="connector" x1="300" y2="100" x2="300" y1="100" />\n        <rect class="rounded-rect" x="150" y="120" width="300" height="80" />\n        <text x="300" y="160" text-anchor="middle">Initialize Parameters</text>\n        <line class="connector" x1="300" y2="200" x2="300" y1="200" />\n        <rect class="diamond" x="200" y="210" width="200" height="80" />\n        <text x="300" y="250" text-anchor="middle">Condition Check</text>\n        <line class="connector" x1="300" y2="290" x2="200" y1="290" />\n        <line class="connector" x1="200" y2="250" x2="200" y1="250" />\n        <rect class="rounded-rect" x="200" y="310" width="200" height="80" />\n        <text x="300" y="350" text-anchor="middle">End</text>\n    </svg>\n</body>\n</html>\n

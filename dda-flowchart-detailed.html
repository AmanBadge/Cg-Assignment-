<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
    <g>
        <!-- Start -->
        <rect x="50" y="20" width="100" height="40" rx="20" ry="20" style="fill:lightblue;stroke:black;stroke-width:2" />
        <text x="100" y="45" text-anchor="middle" font-size="16" fill="black">START</text>

        <!-- Input -->
        <rect x="50" y="100" width="100" height="40" style="fill:lightgreen;stroke:black;stroke-width:2" />
        <text x="100" y="125" text-anchor="middle" font-size="16" fill="black">INPUT</text>

        <!-- Process -->
        <rect x="50" y="180" width="100" height="40" style="fill:orange;stroke:black;stroke-width:2" />
        <text x="100" y="205" text-anchor="middle" font-size="16" fill="black">PROCESS</text>

        <!-- Decision -->
        <polygon points="50,280 100,320 50,360 0,320" style="fill:yellow;stroke:black;stroke-width:2" />
        <text x="50" y="320" text-anchor="middle" font-size="16" fill="black">DECISION</text>

        <!-- Output -->
        <rect x="50" y="380" width="100" height="40" style="fill:lightcoral;stroke:black;stroke-width:2" />
        <text x="100" y="405" text-anchor="middle" font-size="16" fill="black">OUTPUT</text>

        <!-- End -->
        <rect x="50" y="460" width="100" height="40" rx="20" ry="20" style="fill:lightblue;stroke:black;stroke-width:2" />
        <text x="100" y="485" text-anchor="middle" font-size="16" fill="black">END</text>

        <!-- Arrows -->
        <line x1="100" y1="60" x2="100" y2="100" style="stroke:black;stroke-width:2" marker-end="url(#arrowhead)" />
        <line x1="100" y1="140" x2="100" y2="180" style="stroke:black;stroke-width:2" marker-end="url(#arrowhead)" />
        <line x1="100" y1="220" x2="100" y2="280" style="stroke:black;stroke-width:2" marker-end="url(#arrowhead)" />
        <line x1="100" y1="300" x2="100" y2="380" style="stroke:black;stroke-width:2" marker-end="url(#arrowhead)" />
        <line x1="100" y1="420" x2="100" y2="460" style="stroke:black;stroke-width:2" marker-end="url(#arrowhead)" />
    </g>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" 
                refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" style="fill:black;" />
        </marker>
    </defs>
</svg>
